# 雛型：SQL Server + API。前端開發時建議本機 npm run dev，或另行建立 Web 映像。
services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Ldct_Dev_StrongP@ssw0rd"
    ports:
      - "14333:1433"

  api:
    build:
      context: ./src/Api
      dockerfile: Dockerfile
    depends_on:
      - sql
    ports:
      - "5003:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sql,1433;Database=LdctPlatform;User Id=sa;Password=Ldct_Dev_StrongP@ssw0rd;TrustServerCertificate=true;MultipleActiveResultSets=true"
      Cors__Origins__0: "http://localhost:5173"
      Cors__Origins__1: "http://127.0.0.1:5173"
      Cors__Origins__2: "http://10.41.100.1:5173"
      Cors__Origins__3: "http://10.41.100.1:4173"
