apiVersion: v1
kind: Service
metadata:
  name: ldct-web
spec:
  selector:
    app: ldct-web
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ldct-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ldct-web
  template:
    metadata:
      labels:
        app: ldct-web
    spec:
      containers:
        - name: web
          image: ldct-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: 64Mi
            limits:
              cpu: "200m"
              memory: 128Mi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ldct-web-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ldct-web
