# 勿將真實密鑰提交至版本庫；此檔僅示意。於叢集內以 kubectl create secret 或 External Secrets 建立。
apiVersion: v1
kind: Secret
metadata:
  name: ldct-sql
type: Opaque
stringData:
  connectionString: "Server=YOUR_SQL;Database=LdctPlatform;User Id=...;Password=...;TrustServerCertificate=true"
---
apiVersion: v1
kind: Secret
metadata:
  name: ldct-jwt
type: Opaque
stringData:
  signingKey: "REPLACE_WITH_LONG_RANDOM_KEY_AT_LEAST_32_CHARS"
